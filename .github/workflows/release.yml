name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update module.json version & download URL
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          DOWNLOAD="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/module.zip"
          MANIFEST="https://github.com/${{ github.repository }}/releases/latest/download/module.json"
          jq --arg v "$VERSION" --arg d "$DOWNLOAD" --arg m "$MANIFEST" \
            '.version = $v | .download = $d | .manifest = $m' \
            module.json > module.json.tmp && mv module.json.tmp module.json

      - name: Package module zip
        run: |
          zip -r module.zip \
            module.json \
            scripts/ \
            styles/ \
            templates/ \
            languages/ \
            --exclude "*.DS_Store"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            module.zip
            module.json
